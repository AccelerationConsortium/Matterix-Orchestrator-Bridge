[project]
name = "twin-real"
version = "0.1.0"
description = "Real-stub backend for the DT-orchestrator bridge"
requires-python = ">=3.11"
dependencies = [
    "twin-core",
    "pydantic>=2.6",
]

[project.optional-dependencies]
flex = [
    "grpcio>=1.67",
    "unitelabs-sila>=0.7.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/twin_real"]

[tool.uv.sources]
twin-core = { workspace = true }
