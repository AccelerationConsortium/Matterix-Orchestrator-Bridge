[project]
name = "twin-sim"
version = "0.1.0"
description = "Matterix simulation backend for the DT-orchestrator bridge"
requires-python = ">=3.11"
dependencies = [
    "twin-core",
    "pydantic>=2.6",
]

[project.optional-dependencies]
# matterix_sm + Isaac Sim are NOT auto-installed. The runtime path
# is gated; configs-only imports work without them.
runtime = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/twin_sim"]

[tool.uv.sources]
twin-core = { workspace = true }
