[project]
name = "twin-core"
version = "0.1.0"
description = "Shared protocols and schemas for DT-orchestrator bridge"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/twin_core"]